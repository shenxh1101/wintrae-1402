<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>价格曲线 · 价格追踪助手</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
            <path d="M3 17 L9 11 L13 15 L21 6" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="21" cy="6" r="2.4" fill="white"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>价格追踪</h1>
          <p>比价省钱小助手</p>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" data-nav="favorites">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M6 3h12a2 2 0 0 1 2 2v16l-8-5-8 5V5a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          商品收藏
        </a>
        <a class="nav-item" data-nav="notifications">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M15 17h5l-1.4-1.4A7 7 0 0 0 19 11V9a7 7 0 1 0-14 0v2a7 7 0 0 0 .4 4.6L4 17h5 M10 21a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          通知记录
        </a>
        <a class="nav-item" data-nav="settings">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          提醒设置
        </a>
      </nav>
      <div class="sidebar-footer">
        <h4>📊 价格走势</h4>
        <p>历史价格趋势一目了然，帮你找到最佳入手时机。</p>
      </div>
    </aside>

    <main class="main-content">
      <a class="back-link" id="backLink">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        返回收藏列表
      </a>

      <div class="page-header">
        <div class="page-title">
          <h2 id="productName">加载中...</h2>
          <p id="productMeta" style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;"></p>
        </div>
        <div class="page-actions">
          <button class="btn btn-secondary btn-sm" id="refreshBtn">
            <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M23 4v6h-6 M1 20v-6h6 M3.5 9a9 9 0 0 1 14.8-3.5L23 10 M20.5 15a9 9 0 0 1-14.8 3.5L1 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            刷新价格
          </button>
          <button class="btn btn-secondary btn-sm" id="openBuyBtn">
            <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6 M15 3h6v6 M10 14 21 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            去购买
          </button>
          <button class="btn btn-primary btn-sm" id="setTargetBtn">
            <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.8"/><path d="M12 7v5l3 2" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
            设置目标价
          </button>
        </div>
      </div>

      <div id="checkInfo"></div>

      <div class="stat-row" id="chartStats"></div>

      <div class="chart-wrap">
        <div class="chart-header">
          <div class="chart-title">
            <h2>历史价格走势</h2>
            <p id="chartRange"></p>
          </div>
        </div>
        <div class="chart-canvas-wrap">
          <canvas id="priceChart"></canvas>
          <div id="hoverCard" style="position:absolute;pointer-events:none;background:rgba(15,23,42,.96);color:white;padding:10px 14px;border-radius:10px;font-size:12px;z-index:10;opacity:0;transform:translate(-50%,-130%);transition:all .15s ease;box-shadow:0 10px 30px rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);line-height:1.7;">
            <div id="hc-date" style="color:#94a3b8;font-weight:600;font-size:11px;"></div>
            <div id="hc-price" style="font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;"></div>
            <div id="hc-delta" style="font-size:11px;font-weight:700;"></div>
          </div>
        </div>
        <div class="chart-legend">
          <div class="legend-item">
            <span class="legend-dot" style="background:linear-gradient(135deg,#0d9488,#0891b2);"></span>
            历史价格线
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.2);"></span>
            历史最低价
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background:#ef4444;"></span>
            异常涨价
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="border:2px dashed rgba(16,185,129,.85);background:transparent;"></span>
            近 7 日趋势
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background:#f59e0b;"></span>
            目标价线
          </div>
        </div>
      </div>

      <div class="product-detail-section">
        <div class="card product-info-card">
          <h4>商品信息</h4>
          <div class="info-list" id="infoList"></div>
        </div>
        <div class="card product-info-card">
          <h4>提醒设置</h4>
          <div id="notifSettings"></div>
          <div style="margin-top: 16px;">
            <h4 style="margin-bottom:12px;">购买状态</h4>
            <div id="planSelect"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-mask" id="targetModal">
    <div class="modal-box" style="max-width:400px;">
      <h3>设置目标提醒价</h3>
      <p style="color:#64748b;font-size:12px;margin-bottom:14px;">价格低于或等于此值时立即通知你</p>
      <div class="form-row">
        <label>期望购入价 (¥)</label>
        <input type="number" id="targetInput" step="0.01" placeholder="例如：1299">
      </div>
      <div class="form-row">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="targetNotify" checked style="accent-color:#0d9488;width:16px;height:16px;">
          <span style="color:#0f172a;">同时开启降价提醒</span>
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="targetCancel">取消</button>
        <button class="btn btn-primary" id="targetSave">保存</button>
      </div>
    </div>
  </div>

  <script src="lib/common.js"></script>
  <script src="lib/chart.js"></script>
  <script src="chart.js"></script>
</body>
</html>
